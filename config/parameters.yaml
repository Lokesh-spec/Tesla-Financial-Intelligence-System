pipeline:
    raw_pdf_path: data/raw
    extracted_text_path: data/extracted
    cleaned_text_path: data/cleaned
    chunked_data_path: data/chunked/
    vector_db_path: data/vector_db_path
ingestion:
    chunk_size: 400
    chunk_overlap: 50
    provider: "openai"
    embedding_model: "text-embedding-3-small"
    dimensions: 1024
retrieval:
    top_k: 10
    similarity_metric: "cosine"
generation:
    max_content_chunks: 10
    temperature: 0
evaluation:
    enable_logging: true